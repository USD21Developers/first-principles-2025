name: Publish dist branch for server pull

on:
  push:
    branches: [main]
    paths:
      - "artifacts/first-principles/public/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dist
  cancel-in-progress: true

jobs:
  publish-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push public/ content to dist branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Work in a temp dir so we don't disturb the checkout
          CONTENT_DIR="$(pwd)/artifacts/first-principles/public"
          WORK_DIR="$(mktemp -d)"

          # Seed the work dir as an orphan repo pointing at origin
          cd "$WORK_DIR"
          git init
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"

          # Try to fetch the existing dist branch so we only push a delta
          git fetch origin dist --depth=1 2>/dev/null && \
            git checkout -b dist FETCH_HEAD || \
            git checkout --orphan dist

          # Replace everything with the fresh public/ content
          git rm -rf . --quiet 2>/dev/null || true
          cp -r "$CONTENT_DIR"/. .

          # Keep a breadcrumb so it's clear where this came from
          echo "Built from main@$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)" > .build-info

          git add -A
          git diff --cached --quiet && echo "No changes — dist branch already up to date." && exit 0

          git commit -m "dist: $(git -C "$GITHUB_WORKSPACE" log -1 --format='%s')"
          git push origin HEAD:dist
