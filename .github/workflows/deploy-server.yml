name: Publish dist branch for server pull

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dist
  cancel-in-progress: true

jobs:
  publish-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push public/ to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/first-principles/public
          publish_branch: dist
          commit_message: "dist: ${{ github.event.head_commit.message }}"
          force_orphan: true
